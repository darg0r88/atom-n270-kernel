# .github/workflows/build-kernel.yml
name: Build Extreme Optimized Atom N270 Kernel (v5.4 LTS)

on:
  workflow_dispatch: # Permite ejecución manual
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-22.04 # Ubuntu 22.04 es más estable para kernels antiguos
    steps:
      - name: Maximize Build Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"

      - name: Install dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses-dev bison flex libssl-dev libelf-dev xz-utils wget bc gcc-multilib rsync kmod dwarves pahole zstd debhelper binutils-i686-linux-gnu gcc-i686-linux-gnu

      - name: Download Kernel 5.4 Source
        run: |
          KVER=$(wget -qO- https://www.kernel.org/finger_banner | grep ' 5.4.' | awk '{print $NF}' | head -n 1)
          if [ -z "$KVER" ]; then KVER="5.4.269"; fi
          echo "Target Kernel Version: $KVER"
          wget -c https://cdn.kernel.org/pub/linux/kernel/v5.x/linux-$KVER.tar.xz
          tar -xf linux-$KVER.tar.xz
          echo "KDIR=linux-$KVER" >> $GITHUB_ENV

      - name: Extreme Configuration for Atom N270
        run: |
          cd ${{ env.KDIR }}
          make ARCH=i386 i386_defconfig
          
          # 1. Arquitectura y Procesador
          ./scripts/config --enable CONFIG_MATOM
          ./scripts/config --disable CONFIG_M686
          ./scripts/config --enable CONFIG_X86_PAE
          ./scripts/config --enable CONFIG_HIGHMEM4G
          ./scripts/config --disable CONFIG_HIGHMEM64G
          ./scripts/config --disable CONFIG_64BIT
          
          # 2. Rendimiento y Latencia
          ./scripts/config --enable CONFIG_PREEMPT
          ./scripts/config --disable CONFIG_PREEMPT_VOLUNTARY
          ./scripts/config --disable CONFIG_PREEMPT_NONE
          ./scripts/config --enable CONFIG_HZ_1000
          ./scripts/config --set-val CONFIG_HZ 1000
          
          # 3. Solución de errores de compilación conocidos en 5.4 + Ubuntu 22.04+
          ./scripts/config --disable CONFIG_DEBUG_INFO_BTF
          ./scripts/config --set-str CONFIG_SYSTEM_TRUSTED_KEYS ""
          ./scripts/config --set-str CONFIG_SYSTEM_REVOCATION_KEYS ""
          ./scripts/config --disable CONFIG_DEBUG_INFO
          
          # 4. Desactivar Mitigaciones (Rendimiento)
          ./scripts/config --disable CONFIG_CPU_MITIGATIONS
          ./scripts/config --disable CONFIG_PAGE_TABLE_ISOLATION
          
          # 5. Drivers i915 (GMA950)
          ./scripts/config --enable CONFIG_DRM_I915
          
          make ARCH=i386 olddefconfig

      - name: Build Kernel (.deb)
        run: |
          cd ${{ env.KDIR }}
          # Usar el cross-compiler para asegurar que no se mezclen arquitecturas
          export KCFLAGS="-march=bonnell -mtune=bonnell -O3 -pipe -fno-stack-protector"
          export KCPPFLAGS="-march=bonnell -mtune=bonnell -O3 -pipe"
          
          # Forzar arquitectura i386 en el paquete deb
          make ARCH=i386 CROSS_COMPILE=i686-linux-gnu- bindeb-pkg -j$(nproc) LOCALVERSION=-atom-n270-extreme KDEB_PKGVERSION=1

      - name: Upload Kernel Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: atom-n270-kernel-5.4-deb
          path: |
            *.deb
            ${{ env.KDIR }}/.config
